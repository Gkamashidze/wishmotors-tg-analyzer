name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Dummy values — tests use mocks; DB tests use the postgres service
      BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      GROUP_ID: "-1000000000001"
      SALES_TOPIC_ID: "1"
      ORDERS_TOPIC_ID: "2"
      EXPENSES_TOPIC_ID: "3"
      STOCK_TOPIC_ID: "4"
      ADMIN_IDS: "12345678"
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      RAILWAY_ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy bot/ database/ config.py --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest tests/ -v --tb=short
