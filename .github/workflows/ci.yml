name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bot-tests:
    name: Bot — Python tests + lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy bot/ database/ config.py --ignore-missing-imports --no-strict-optional

      - name: Pytest
        env:
          BOT_TOKEN: "test"
          GROUP_ID: "1"
          SALES_TOPIC_ID: "2"
          ORDERS_TOPIC_ID: "3"
          EXPENSES_TOPIC_ID: "4"
          STOCK_TOPIC_ID: "5"
          NISIAS_TOPIC_ID: "6"
          DATABASE_URL: "postgresql://x:x@localhost/test"
          ADMIN_IDS: "12345"
          TIMEZONE: "Asia/Tbilisi"
        run: python -m pytest tests/ -q

  dashboard-tests:
    name: Dashboard — TypeScript + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run
